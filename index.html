<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiokoks PDF Imposition Tool</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="top-nav">
        <div class="logo">
            <span class="logo-white">Spiokoks PDF</span><span class="logo-orange">Imposition</span>
        </div>
        
        <div class="nav-actions" id="navActions" style="display: none;">
            <input type="file" id="pdfInput" accept="application/pdf" class="custom-file-input">
            <span id="statusMessage"></span>
            <button id="generateBtn" class="primary-btn">Preview Imposition</button>
            <button id="downloadBtn" class="secondary-btn" style="display: none;">Download PDF</button>
            <button id="logoutBtn" class="secondary-btn logout-btn">Logout</button>
        </div>
    </div>
    
    <div id="authScreen" class="auth-container">
        <div class="auth-box">
            <h2 id="authTitle">Login</h2>
            <p id="authSubtitle">Please sign in to access the booklet generator.</p>
            
            <form id="authForm">
                <div class="auth-input-group">
                    <label for="authEmail">Email Address</label>
                    <input type="email" id="authEmail" required placeholder="name@example.com">
                </div>
                <div class="auth-input-group">
                    <label for="authPassword">Password</label>
                    <input type="password" id="authPassword" required placeholder="••••••••">
                </div>
                <button type="submit" id="authSubmitBtn" class="primary-btn">Sign In</button>
            </form>
            
            <div class="auth-switch">
                <span id="authSwitchText">Don't have an account?</span> 
                <a href="#" id="authSwitchLink">Sign Up</a>
            </div>
            <div id="authError" class="auth-error-message"></div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="app-container">
            
            <div class="icon-sidebar">
                <button class="tab-btn active" data-target="modeGroup" title="Imposition Mode">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                </button>
                <button class="tab-btn" data-target="paperGroup" title="Paper Size">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                </button>
                <button class="tab-btn" data-target="saddleBindingGroup" title="Book Binding" id="saddleTabBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                </button>
                <button class="tab-btn" data-target="scaleGroup" title="Scale">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6"></path><path d="M9 21H3v-6"></path><path d="M21 3l-7 7"></path><path d="M3 21l7-7"></path></svg>
                </button>
                <button class="tab-btn" data-target="whitespaceGroup" title="White Space">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><path d="M8 3v18"></path><path d="M16 3v18"></path><path d="M3 8h18"></path><path d="M3 16h18"></path></svg>
                </button>
                <button class="tab-btn" data-target="marksGroup" title="Printer's Marks">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5v3"></path><path d="M5 5h3"></path><path d="M19 5v3"></path><path d="M19 5h-3"></path><path d="M5 19v-3"></path><path d="M5 19h3"></path><path d="M19 19v-3"></path><path d="M19 19h-3"></path></svg>
                </button>
                <button class="tab-btn" data-target="bleedsGroup" title="Bleeds">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
                </button>
                <button class="tab-btn" data-target="outputGroup" title="Output">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                </button>
            </div>

            <div class="panel-sidebar" id="panelSidebar">
                <div class="panel-sidebar-inner">
                    <div class="panel-header">
                        <h3 id="panelTitle">Imposition Mode</h3>
                        <button class="close-panel" id="closePanelBtn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>

                    <div id="modeGroup" class="tab-content active-tab">
                        <div class="radio-group" style="margin-left: 0;">
                            <label><input type="radio" name="impositionMode" value="saddle" checked> Saddle Stitch</label>
                            <label><input type="radio" name="impositionMode" value="perfect16"> Perfect Bind (16-per signature)</label>
                            <label><input type="radio" name="impositionMode" value="multiout"> Multi-out (Grid)</label>
                            <label><input type="radio" name="impositionMode" value="workandturn"> Work & Turn</label>
                            <label><input type="radio" name="impositionMode" value="sanaol"> Sana OL (Contact Sheet)</label>
                        </div>
                    </div>

                    <div id="paperGroup" class="tab-content">
                        <div class="input-row">
                            <label>Width <input type="number" id="paperWidth" value="19" step="0.1"></label> inches
                        </div>
                        <div class="input-row">
                            <label>Height <input type="number" id="paperHeight" value="13" step="0.1"></label> inches
                        </div>
                        <label><input type="checkbox" id="landscape" checked> Landscape</label>
                    </div>

                    <div id="saddleBindingGroup" class="tab-content">
                        <div class="input-row">
                            <label>Saddle size: <input type="number" id="saddleSize" value="4"></label> sheets
                        </div>
                        <label><input type="checkbox" id="fillLastSaddle"> Fill last saddle</label>
                    </div>

                    <div id="scaleGroup" class="tab-content">
                        <label><input type="checkbox" id="autoscale"> Autoscale</label>
                        <label><input type="checkbox" id="preserveAspect" checked> Preserve aspect ratio</label>
                    </div>

                    <div id="whitespaceGroup" class="tab-content">
                        <div class="input-row">
                            <label>Margins: Left <input type="number" id="marginLeft" value="0.25" step="0.01"></label>
                            <label>Top <input type="number" id="marginTop" value="0.25" step="0.01"></label>
                        </div>
                        <div class="input-row">
                            <label>Gutter / Gap <input type="number" id="centerGutter" value="0" step="0.01"></label>
                        </div>
                        <div class="input-row layout-saddle-only">
                            <label>Page Creep <input type="number" id="pageCreep" value="0" step="0.01"></label>
                        </div>
                        <div class="radio-group layout-saddle-only">
                            <label><input type="radio" name="creepType" value="outward" checked> Creep Outward</label>
                            <label><input type="radio" name="creepType" value="inward"> Creep Inward</label>
                        </div>
                        <label><input type="checkbox" id="centerOutput" checked> Center output on page</label>
                    </div>

                    <div id="marksGroup" class="tab-content">
                        <label><input type="checkbox" id="drawCropMarks" checked> Draw crop marks</label>
                        <label><input type="checkbox" id="drawCenterMarks" checked> Draw center marks</label>
                        <div class="input-row">
                            <label>Line length <input type="number" id="markLength" value="0.25" step="0.01"></label>
                        </div>
                        <div class="input-row">
                            <label>Line thickness <input type="number" id="markThickness" value="0.013" step="0.001"></label>
                        </div>
                        <div class="input-row">
                            <label>Line distance <input type="number" id="markDistance" value="0.138" step="0.001"></label>
                        </div>
                        <label><input type="checkbox" id="knockout" checked> Knockout</label>
                    </div>

                    <div id="bleedsGroup" class="tab-content">
                        <div class="radio-group">
                            <label><input type="radio" name="bleedType" value="none"> No bleeds</label>
                            <label><input type="radio" name="bleedType" value="fixed" checked> Fixed bleeds</label>
                        </div>
                        <div class="input-row">
                            <label>Left & right <input type="number" id="bleedLR" value="0.125" step="0.01"></label>
                        </div>
                        <div class="input-row">
                            <label>Top & bottom <input type="number" id="bleedTB" value="0.125" step="0.01"></label>
                        </div>
                    </div>

                     <div id="outputGroup" class="tab-content">
                        <label><input type="checkbox" id="includeFilename" checked> Include Filename Center Top</label>
                        <label><input type="checkbox" id="includeFilenameLeft"> Include Filename Center Left</label>
                        <label><input type="checkbox" id="rotatePages"> Rotate source pages</label>
                        <label><input type="checkbox" id="rotateOutput"> Rotate final sheet (CCW)</label>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div class="preview-container">
                    <div id="placeholderText">
                        <h2>Upload your PDF</h2>
                        <p>Hit "Preview Imposition" at the top to see your perfectly trimmed layout configuration.</p>
                    </div>
                    <iframe id="pdfPreview" title="PDF Preview"></iframe>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
